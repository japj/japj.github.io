# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: JAPJ.net
author: Jeroen Janssen
description: > # this means to ignore newlines until "baseurl:"
  JAPJ.net
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://www.japj.net" # the base hostname & protocol for your site
twitter_user: japj
github_user:  japj

# Disqus Comments
disqus_short_name: japj
disqus_show_comment_count: true

gravatar_url: http://www.gravatar.com/avatar/6fae6f510547bc871de7a35e4af07d9b
subscribe_url: www.japj.net/feed.xml
github_repo_url: https://github.com/japj/japj.github.io

# Build settings
markdown: kramdown

kramdown:
  hard_wrap: false

#
# Jekyll Settings
#
permalink: /archive/:year/:month/:day/:title/
paginate: 20
paginate_path: "page/:num"

# Google Analytics
google_analytics_tracking_id: UA-68330-2

gems:
  - jekyll-paginate
  - jekyll-sitemap